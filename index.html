<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>小蛹的 Minecraft 英文積木世界</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none}
body{font-family:'Arial',sans-serif;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);min-height:100vh;overflow-x:hidden}

/* 開始畫面 */
.start-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg,#87CEEB 0%,#87CEEB 60%,#5cb85c 60%,#3d8b3d 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000}
.start-screen.hidden{display:none}
.logo{font-size:80px;animation:bounce 1s infinite}
@keyframes bounce{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-20px) rotate(5deg)}}
.title{font-size:28px;color:#fff;text-shadow:3px 3px 0 #000,-1px -1px 0 #000;margin:10px 0}
.subtitle{color:#ffeb3b;font-size:16px;text-shadow:2px 2px 0 #000;margin-bottom:20px}
.start-btn{background:linear-gradient(180deg,#4CAF50,#388E3C);border:4px solid #2E7D32;padding:15px 50px;color:#fff;font-size:22px;border-radius:8px;text-shadow:2px 2px #000;cursor:pointer;box-shadow:0 6px 0 #1B5E20}
.start-btn:active{transform:translateY(4px);box-shadow:0 2px 0 #1B5E20}
.features{display:flex;gap:15px;margin-top:25px;flex-wrap:wrap;justify-content:center;padding:0 20px}
.feature{background:rgba(0,0,0,0.5);padding:10px 15px;border-radius:10px;color:#fff;font-size:12px;text-align:center}
.feature span{font-size:24px;display:block;margin-bottom:5px}

/* 主遊戲畫面 */
.game-container{display:none;min-height:100vh;padding:10px;padding-bottom:80px}
.game-container.active{display:block}

/* 頂部狀態欄 */
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 15px;background:rgba(0,0,0,0.7);border-radius:12px;margin-bottom:10px;flex-wrap:wrap;gap:10px}
.stat{display:flex;align-items:center;gap:5px;color:#fff;font-size:14px}
.stat-icon{font-size:20px}
.level-badge{background:linear-gradient(135deg,#FFD700,#FFA500);padding:5px 12px;border-radius:20px;font-weight:bold;color:#000;font-size:12px}

/* 建築進度區 */
.building-area{background:linear-gradient(180deg,#87CEEB 0%,#87CEEB 50%,#8B4513 50%,#654321 100%);border-radius:15px;padding:15px;margin-bottom:10px;min-height:200px;position:relative;overflow:hidden}
.building-title{color:#fff;text-shadow:2px 2px #000;font-size:16px;margin-bottom:10px;text-align:center}
.building-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:2px;max-width:320px;margin:0 auto}
.block{aspect-ratio:1;border-radius:3px;transition:all 0.3s;position:relative}
.block.empty{background:rgba(255,255,255,0.1);border:1px dashed rgba(255,255,255,0.3)}
.block.filled{animation:placeBlock 0.5s}
@keyframes placeBlock{0%{transform:scale(0) rotate(180deg)}100%{transform:scale(1) rotate(0deg)}}
.block.wood{background:linear-gradient(135deg,#8B4513,#654321)}
.block.stone{background:linear-gradient(135deg,#808080,#606060)}
.block.grass{background:linear-gradient(180deg,#5cb85c 30%,#8B4513 30%)}
.block.glass{background:linear-gradient(135deg,#87CEEB,#5fb3d4);opacity:0.7}
.block.brick{background:linear-gradient(135deg,#B22222,#8B0000)}
.block.gold{background:linear-gradient(135deg,#FFD700,#DAA520)}
.building-progress{text-align:center;margin-top:10px;color:#fff;text-shadow:1px 1px #000;font-size:14px}
.progress-bar{height:12px;background:rgba(0,0,0,0.5);border-radius:6px;margin-top:5px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#4CAF50,#8BC34A);border-radius:6px;transition:width 0.5s}

/* 題目區 */
.question-area{background:rgba(255,255,255,0.95);border-radius:15px;padding:20px;margin-bottom:10px;box-shadow:0 4px 15px rgba(0,0,0,0.3)}
.question-type{display:inline-block;padding:5px 12px;border-radius:20px;font-size:12px;color:#fff;margin-bottom:10px}
.question-type.vocab{background:#2196F3}
.question-type.spell{background:#9C27B0}
.question-type.read{background:#FF9800}
.question-type.listen{background:#E91E63}
.question-word{font-size:36px;text-align:center;margin:15px 0}
.question-text{font-size:18px;text-align:center;color:#333;margin:10px 0;line-height:1.6}
.question-hint{font-size:14px;color:#666;text-align:center;margin:10px 0}
.question-sentence{font-size:16px;color:#555;text-align:center;margin:10px 0;font-style:italic}

/* 選項按鈕 */
.options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:15px}
.option-btn{padding:15px;font-size:16px;border:3px solid #ddd;border-radius:12px;background:#fff;cursor:pointer;transition:all 0.2s;color:#333}
.option-btn:active{transform:scale(0.95)}
.option-btn.correct{background:#4CAF50;border-color:#388E3C;color:#fff;animation:correct 0.5s}
.option-btn.wrong{background:#f44336;border-color:#c62828;color:#fff;animation:shake 0.5s}
@keyframes correct{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-10px)}75%{transform:translateX(10px)}}

/* 拼寫輸入 */
.spell-input{display:flex;justify-content:center;gap:8px;margin:20px 0;flex-wrap:wrap}
.spell-box{width:40px;height:50px;border:3px solid #2196F3;border-radius:8px;font-size:24px;text-align:center;text-transform:uppercase;background:#fff}
.spell-box:focus{border-color:#1976D2;outline:none;box-shadow:0 0 10px rgba(33,150,243,0.5)}
.spell-box.correct{border-color:#4CAF50;background:#E8F5E9}
.spell-box.wrong{border-color:#f44336;background:#FFEBEE}

/* 鍵盤 */
.keyboard{display:flex;flex-direction:column;gap:5px;margin-top:15px}
.key-row{display:flex;justify-content:center;gap:4px}
.key{min-width:28px;height:40px;border:none;border-radius:6px;font-size:16px;font-weight:bold;cursor:pointer;background:linear-gradient(180deg,#f5f5f5,#e0e0e0);color:#333;box-shadow:0 2px 0 #bbb}
.key:active{transform:translateY(2px);box-shadow:0 0 0 #bbb}
.key.wide{min-width:60px;font-size:12px}
.key.enter{background:linear-gradient(180deg,#4CAF50,#388E3C);color:#fff;box-shadow:0 2px 0 #1B5E20}

/* 聽力按鈕 */
.listen-btn{width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,#E91E63,#C2185B);border:none;font-size:40px;cursor:pointer;margin:20px auto;display:block;box-shadow:0 6px 0 #880E4F;transition:all 0.2s}
.listen-btn:active{transform:translateY(4px);box-shadow:0 2px 0 #880E4F}
.listen-btn.playing{animation:pulse 1s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}

/* 結果顯示 */
.result-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;z-index:500}
.result-overlay.show{display:flex}
.result-box{background:#fff;border-radius:20px;padding:30px;text-align:center;max-width:90%;animation:popIn 0.3s}
@keyframes popIn{0%{transform:scale(0)}100%{transform:scale(1)}}
.result-icon{font-size:80px;margin-bottom:15px}
.result-text{font-size:24px;font-weight:bold;margin-bottom:10px}
.result-detail{font-size:16px;color:#666;margin-bottom:20px}
.result-btn{padding:12px 30px;font-size:18px;border:none;border-radius:10px;cursor:pointer;color:#fff}
.result-btn.next{background:linear-gradient(180deg,#4CAF50,#388E3C)}
.result-btn.retry{background:linear-gradient(180deg,#FF9800,#F57C00)}

/* 關卡選擇 */
.level-select{display:none;padding:20px}
.level-select.active{display:block}
.level-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;margin-top:20px}
.level-card{background:linear-gradient(135deg,#667eea,#764ba2);border-radius:15px;padding:20px;color:#fff;cursor:pointer;transition:transform 0.2s;position:relative;overflow:hidden}
.level-card:active{transform:scale(0.95)}
.level-card.locked{background:linear-gradient(135deg,#666,#444);cursor:not-allowed}
.level-card.locked::after{content:‘🔒’;position:absolute;top:10px;right:10px;font-size:24px}
.level-card.completed::after{content:‘⭐’;position:absolute;top:10px;right:10px;font-size:24px}
.level-num{font-size:32px;font-weight:bold}
.level-name{font-size:14px;margin-top:5px;opacity:0.9}
.level-desc{font-size:12px;margin-top:8px;opacity:0.7}

/* 成就 */
.achievements{position:fixed;top:50px;right:10px;z-index:100}
.achievement-popup{background:linear-gradient(135deg,#FFD700,#FFA500);padding:10px 15px;border-radius:10px;color:#000;font-size:14px;animation:slideIn 0.5s,slideOut 0.5s 2.5s forwards;box-shadow:0 4px 15px rgba(0,0,0,0.3)}
@keyframes slideIn{0%{transform:translateX(200px);opacity:0}100%{transform:translateX(0);opacity:1}}
@keyframes slideOut{0%{transform:translateX(0);opacity:1}100%{transform:translateX(200px);opacity:0}}

/* 底部導航 */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,0.9);display:flex;justify-content:space-around;padding:10px 0;z-index:100}
.nav-btn{background:none;border:none;color:#fff;font-size:12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;opacity:0.7}
.nav-btn.active{opacity:1}
.nav-btn span:first-child{font-size:24px}

/* 統計頁面 */
.stats-page{display:none;padding:20px}
.stats-page.active{display:block}
.stats-card{background:rgba(255,255,255,0.1);border-radius:15px;padding:20px;margin-bottom:15px}
.stats-title{color:#fff;font-size:18px;margin-bottom:15px}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px}
.stat-item{text-align:center;color:#fff}
.stat-value{font-size:32px;font-weight:bold;color:#4CAF50}
.stat-label{font-size:12px;opacity:0.7;margin-top:5px}

/* 單字本 */
.wordbook{display:none;padding:20px}
.wordbook.active{display:block}
.word-list{max-height:70vh;overflow-y:auto}
.word-item{background:rgba(255,255,255,0.1);border-radius:10px;padding:15px;margin-bottom:10px;color:#fff}
.word-en{font-size:20px;font-weight:bold}
.word-zh{font-size:14px;opacity:0.8;margin-top:5px}
.word-sentence{font-size:12px;opacity:0.6;margin-top:8px;font-style:italic}
</style>

</head>
<body>

<!-- 開始畫面 -->

<div class="start-screen" id="startScreen">
  <div class="logo">🧱</div>
  <div class="title">Minecraft 英文積木世界</div>
  <div class="subtitle">小蛹的英文冒險</div>
  <button class="start-btn" onclick="startGame()">開始冒險</button>
  <div class="features">
    <div class="feature"><span>📚</span>學單字</div>
    <div class="feature"><span>✏️</span>練拼寫</div>
    <div class="feature"><span>📖</span>讀句子</div>
    <div class="feature"><span>🔊</span>聽發音</div>
  </div>
</div>

<!-- 主遊戲 -->

<div class="game-container" id="gameContainer">
  <!-- 頂部狀態欄 -->
  <div class="top-bar">
    <div class="stat"><span class="stat-icon">🧱</span><span id="blocksCount">0</span></div>

    <div class="stat"><span class="stat-icon">⭐</span><span id="starsCount">0</span></div>
  </div>

  <!-- 建築區 -->

  <div class="building-area">
    <div class="building-title" id="buildingTitle">🏠 我的小屋 (0/30)</div>
    <div class="building-grid" id="buildingGrid"></div>
    <div class="building-progress">
      <span id="progressText">收集積木來建造房屋！</span>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
  </div>

  <!-- 題目區 -->

  <div class="question-area" id="questionArea">
    <span class="question-type vocab" id="questionType">👀 看圖選字</span>
    <div class="question-word" id="questionWord">🍎</div>
    <div class="question-text" id="questionText">這是什麼？</div>
    <div class="question-hint" id="questionHint"></div>
    <div class="question-sentence" id="questionSentence"></div>
    <div class="options" id="optionsArea"></div>
    <div class="spell-input" id="spellInput" style="display:none"></div>
    <div class="keyboard" id="keyboard" style="display:none"></div>
    <button class="listen-btn" id="listenBtn" style="display:none">🔊</button>
  </div>
</div>

<!-- 關卡選擇 -->

<div class="level-select" id="levelSelect">
  <div class="top-bar">
    <div class="stat"><span class="stat-icon">🧱</span><span id="blocksCount2">0</span></div>
    <div style="color:#fff;font-size:18px">選擇關卡</div>
    <div class="stat"><span class="stat-icon">⭐</span><span id="starsCount2">0</span></div>
  </div>
  <div class="level-grid" id="levelGrid"></div>
</div>

<!-- 統計頁面 -->

<div class="stats-page" id="statsPage">
  <div class="top-bar">
    <div style="color:#fff;font-size:18px">📊 學習統計</div>
  </div>
  <div class="stats-card">
    <div class="stats-title">今日學習</div>
    <div class="stats-grid">
      <div class="stat-item"><div class="stat-value" id="todayWords">0</div><div class="stat-label">學習單字</div></div>
      <div class="stat-item"><div class="stat-value" id="todayCorrect">0</div><div class="stat-label">答對題數</div></div>
      <div class="stat-item"><div class="stat-value" id="todayBlocks">0</div><div class="stat-label">獲得積木</div></div>
      <div class="stat-item"><div class="stat-value" id="todayTime">0</div><div class="stat-label">學習分鐘</div></div>
    </div>
  </div>
  <div class="stats-card">
    <div class="stats-title">總成就</div>
    <div class="stats-grid">
      <div class="stat-item"><div class="stat-value" id="totalWords">0</div><div class="stat-label">已學單字</div></div>
      <div class="stat-item"><div class="stat-value" id="totalStars">0</div><div class="stat-label">獲得星星</div></div>
      <div class="stat-item"><div class="stat-value" id="totalBuildings">0</div><div class="stat-label">完成建築</div></div>
      <div class="stat-item"><div class="stat-value" id="totalDays">0</div><div class="stat-label">學習天數</div></div>
    </div>
  </div>
</div>

<!-- 單字本 -->

<div class="wordbook" id="wordbook">
  <div class="top-bar">
    <div style="color:#fff;font-size:18px">📖 我的單字本</div>
  </div>
  <div class="word-list" id="wordList"></div>
</div>

<!-- 底部導航 -->

<div class="bottom-nav" id="bottomNav" style="display:none">
  <button class="nav-btn active" onclick="showPage('game')"><span>🎮</span>遊戲</button>
  <button class="nav-btn" onclick="showPage('levels')"><span>🗺️</span>關卡</button>
  <button class="nav-btn" onclick="showPage('wordbook')"><span>📖</span>單字</button>
  <button class="nav-btn" onclick="showPage('stats')"><span>📊</span>統計</button>
</div>

<!-- 結果彈窗 -->

<div class="result-overlay" id="resultOverlay">
  <div class="result-box">
    <div class="result-icon" id="resultIcon">🎉</div>
    <div class="result-text" id="resultText">答對了！</div>
    <div class="result-detail" id="resultDetail">+1 積木</div>
    <button class="result-btn next" id="resultBtn" onclick="nextQuestion()">下一題</button>
  </div>
</div>

<!-- 成就提示 -->

<div class="achievements" id="achievements"></div>

  learnedWords: [],
  levelProgress: {},
  todayStats: {words:0, correct:0, blocks:0, startTime:Date.now()}
};

// 載入存檔
function loadGame() {
  const saved = localStorage.getItem('minecraft_english_save');
  if (saved) {
    const data = JSON.parse(saved);
    gameState = {...gameState, ...data};
  }
}

// 儲存遊戲
function saveGame() {
  localStorage.setItem('minecraft_english_save', JSON.stringify(gameState));
}

// ===== 開始遊戲 =====
function startGame() {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameContainer').classList.add('active');
  document.getElementById('bottomNav').style.display = 'flex';
  loadGame();
  initLevel(gameState.currentLevel);
  updateUI();
}

// ===== 初始化關卡 =====
function initLevel(levelId) {
  gameState.currentLevel = levelId;
  gameState.currentWordIndex = 0;
  const level = LEVELS.find(l => l.id === levelId);
  
  if (!gameState.levelProgress[levelId]) {
    gameState.levelProgress[levelId] = {blocks: 0, completed: false};
  }
  
  document.getElementById('levelBadge').textContent = `第${levelId}關：${level.name}`;
  document.getElementById('buildingTitle').textContent = `${level.icon} ${level.name} (${gameState.levelProgress[levelId].blocks}/${level.blocksNeeded})`;
  
  initBuildingGrid(level);
  nextQuestion();
  saveGame();
}

// ===== 建築網格 =====
function initBuildingGrid(level) {
  const grid = document.getElementById('buildingGrid');
  grid.innerHTML = '';
  
  const totalBlocks = level.blocksNeeded;
  const filledBlocks = gameState.levelProgress[level.id]?.blocks || 0;
  
  for (let i = 0; i < totalBlocks; i++) {
    const block = document.createElement('div');
    block.className = 'block';
    
    if (i < filledBlocks) {
      const blockType = level.blockTypes[i % level.blockTypes.length];
      block.classList.add('filled', blockType);
    } else {
      block.classList.add('empty');
    }
    
    grid.appendChild(block);
  }
  
  const progress = (filledBlocks / totalBlocks) * 100;
  document.getElementById('progressFill').style.width = progress + '%';
  document.getElementById('progressText').textContent = 
    filledBlocks >= totalBlocks ? '🎉 建築完成！' : `還需要 ${totalBlocks - filledBlocks} 塊積木`;
}

// ===== 下一題 =====
function nextQuestion() {
  document.getElementById('resultOverlay').classList.remove('show');
  
  const level = LEVELS.find(l => l.id === gameState.currentLevel);
  const words = level.words;
  
  // 隨機選一個單字
  const wordIndex = Math.floor(Math.random() * words.length);
  const word = words[wordIndex];
  
  // 輪流不同題型
  gameState.currentQuestionType = (gameState.currentQuestionType + 1) % 4;
  
  generateQuestion(word, gameState.currentQuestionType);
}

// ===== 生成題目 =====
function generateQuestion(word, type) {
  const questionArea = document.getElementById('questionArea');
  const typeEl = document.getElementById('questionType');
  const wordEl = document.getElementById('questionWord');
  const textEl = document.getElementById('questionText');
  const hintEl = document.getElementById('questionHint');
  const sentenceEl = document.getElementById('questionSentence');
  const optionsEl = document.getElementById('optionsArea');
  const spellEl = document.getElementById('spellInput');
  const keyboardEl = document.getElementById('keyboard');
  const listenEl = document.getElementById('listenBtn');
  
  // 隱藏所有輸入區
  optionsEl.style.display = 'none';
  spellEl.style.display = 'none';
  keyboardEl.style.display = 'none';
  listenEl.style.display = 'none';
  
  // 儲存當前單字
  questionArea.dataset.answer = word.en;
  questionArea.dataset.word = JSON.stringify(word);
  
  switch(type) {
    case 0: // 看圖選字
      typeEl.className = 'question-type vocab';
      typeEl.textContent = '👀 看圖選字';
      wordEl.textContent = word.img;
      wordEl.style.display = 'block';
      textEl.textContent = '這是什麼？';
      hintEl.textContent = `提示：${word.zh}`;
      sentenceEl.textContent = '';
      generateOptions(word, 'en');
      optionsEl.style.display = 'grid';
      break;
      
    case 1: // 拼寫
      typeEl.className = 'question-type spell';
      typeEl.textContent = '✏️ 拼寫單字';
      wordEl.textContent = word.img;
      wordEl.style.display = 'block';
      textEl.textContent = `請拼出「${word.zh}」`;
      hintEl.textContent = `${word.en.length} 個字母`;
      sentenceEl.textContent = '';
      generateSpellInput(word);
      spellEl.style.display = 'flex';
      keyboardEl.style.display = 'flex';
      break;
      
    case 2: // 句子配對
      typeEl.className = 'question-type read';
      typeEl.textContent = '📖 句子配對';
      wordEl.style.display = 'none';
      textEl.textContent = word.sentence.replace(word.en, '_____');
      hintEl.textContent = `提示：${word.zh}`;
      sentenceEl.textContent = '';
      generateOptions(word, 'en');
      optionsEl.style.display = 'grid';
      break;
      
    case 3: // 聽力
      typeEl.className = 'question-type listen';
      typeEl.textContent = '🔊 聽音選字';
      wordEl.style.display = 'none';
      textEl.textContent = '聽發音，選出正確的單字';
      hintEl.textContent = '';
      sentenceEl.textContent = '';
      listenEl.style.display = 'block';
      listenEl.onclick = () => speak(word.en);
      generateOptions(word, 'both');
      optionsEl.style.display = 'grid';
      // 自動播放一次
      setTimeout(() => speak(word.en), 500);
      break;
  }
}

// ===== 生成選項 =====
function generateOptions(correctWord, displayType) {
  const optionsEl = document.getElementById('optionsArea');
  optionsEl.innerHTML = '';
  
  const level = LEVELS.find(l => l.id === gameState.currentLevel);
  const allWords = level.words.filter(w => w.en !== correctWord.en);
  
  // 隨機選3個錯誤選項
  const shuffled = allWords.sort(() => Math.random() - 0.5);
  const wrongOptions = shuffled.slice(0, 3);
  
  // 合併並打亂
  const options = [correctWord, ...wrongOptions].sort(() => Math.random() - 0.5);
  
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    
    if (displayType === 'en') {
      btn.textContent = opt.en;
    } else if (displayType === 'zh') {
      btn.textContent = opt.zh;
    } else {
      btn.textContent = `${opt.en} (${opt.zh})`;
    }
    
    btn.onclick = () => checkAnswer(opt.en, correctWord.en, btn);
    optionsEl.appendChild(btn);
  });
}

// ===== 拼寫輸入 =====
function generateSpellInput(word) {
  const spellEl = document.getElementById('spellInput');
  const keyboardEl = document.getElementById('keyboard');
  spellEl.innerHTML = '';
  
  // 建立輸入框
  for (let i = 0; i < word.en.length; i++) {
    const input = document.createElement('input');
    input.className = 'spell-box';
    input.maxLength = 1;
    input.dataset.index = i;
    input.readOnly = true;
    spellEl.appendChild(input);
  }
  
  // 建立鍵盤
  keyboardEl.innerHTML = '';
  const rows = ['qwertyuiop', 'asdfghjkl', 'zxcvbnm'];
  
  rows.forEach((row, rowIndex) => {
    const rowEl = document.createElement('div');
    rowEl.className = 'key-row';
    
    if (rowIndex === 2) {
      const delBtn = document.createElement('button');
      delBtn.className = 'key wide';
      delBtn.textContent = '⌫';
      delBtn.onclick = () => deleteLetter();
      rowEl.appendChild(delBtn);
    }
    
    row.split('').forEach(letter => {
      const key = document.createElement('button');
      key.className = 'key';
      key.textContent = letter.toUpperCase();
      key.onclick = () => inputLetter(letter);
      rowEl.appendChild(key);
    });
    
    if (rowIndex === 2) {
      const enterBtn = document.createElement('button');
      enterBtn.className = 'key wide enter';
      enterBtn.textContent = '確定';
      enterBtn.onclick = () => checkSpelling();
      rowEl.appendChild(enterBtn);
    }
    
    keyboardEl.appendChild(rowEl);
  });
}

let currentSpellIndex = 0;

function inputLetter(letter) {
  const inputs = document.querySelectorAll('.spell-box');
  if (currentSpellIndex < inputs.length) {
    inputs[currentSpellIndex].value = letter.toUpperCase();
    currentSpellIndex++;
  }
}

function deleteLetter() {
  if (currentSpellIndex > 0) {
    currentSpellIndex--;
    const inputs = document.querySelectorAll('.spell-box');
    inputs[currentSpellIndex].value = '';
  }
}

function checkSpelling() {
  const inputs = document.querySelectorAll('.spell-box');
  const answer = document.getElementById('questionArea').dataset.answer;
  let userAnswer = '';
  
  inputs.forEach(input => {
    userAnswer += input.value.toLowerCase();
  });
  
  const isCorrect = userAnswer === answer.toLowerCase();
  
  inputs.forEach((input, i) => {
    if (input.value.toLowerCase() === answer[i].toLowerCase()) {
      input.classList.add('correct');
    } else {
      input.classList.add('wrong');
    }
  });
  
  setTimeout(() => {
    showResult(isCorrect, answer);
    currentSpellIndex = 0;
  }, 500);
}

// ===== 檢查答案 =====
function checkAnswer(selected, correct, btnEl) {
  const isCorrect = selected === correct;
  
  if (isCorrect) {
    btnEl.classList.add('correct');
  } else {
    btnEl.classList.add('wrong');
    // 顯示正確答案
    document.querySelectorAll('.option-btn').forEach(btn => {
      if (btn.textContent.includes(correct)) {
        btn.classList.add('correct');
      }
    });
  }
  
  setTimeout(() => showResult(isCorrect, correct), 600);
}

// ===== 顯示結果 =====
function showResult(isCorrect, answer) {
  const overlay = document.getElementById('resultOverlay');
  const icon = document.getElementById('resultIcon');
  const text = document.getElementById('resultText');
  const detail = document.getElementById('resultDetail');
  const btn = document.getElementById('resultBtn');
  
  const word = JSON.parse(document.getElementById('questionArea').dataset.word);
  
  if (isCorrect) {
    icon.textContent = '🎉';
    text.textContent = '答對了！';
    detail.innerHTML = `<b>${word.en}</b> = ${word.zh}<br>+1 🧱 積木`;
    btn.className = 'result-btn next';
    btn.textContent = '下一題';
    
    // 增加積木
    gameState.blocks++;
    const level = LEVELS.find(l => l.id === gameState.currentLevel);
    gameState.levelProgress[level.id].blocks++;
    gameState.todayStats.blocks++;
    gameState.todayStats.correct++;
    
    // 記錄學過的單字
    if (!gameState.learnedWords.includes(word.en)) {
      gameState.learnedWords.push(word.en);
      gameState.todayStats.words++;
    }
    
    // 更新建築
    updateBuilding();
    
    // 檢查是否完成關卡
    if (gameState.levelProgress[level.id].blocks >= level.blocksNeeded) {
      gameState.levelProgress[level.id].completed = true;
      gameState.stars += 3;
      showAchievement(`🏆 完成「${level.name}」！`);
    }
    
  } else {
    icon.textContent = '😢';
    text.textContent = '再試一次！';
    detail.innerHTML = `正確答案：<b>${word.en}</b> = ${word.zh}<br>${word.sentence}`;
    btn.className = 'result-btn retry';
    btn.textContent = '繼續加油';
    gameState.wrongCount++;
  }
  
  updateUI();
  saveGame();
  overlay.classList.add('show');
}

// ===== 更新建築 =====
function updateBuilding() {
  const level = LEVELS.find(l => l.id === gameState.currentLevel);
  const blocks = gameState.levelProgress[level.id].blocks;
  
  document.getElementById('buildingTitle').textContent = 
    `${level.icon} ${level.name} (${blocks}/${level.blocksNeeded})`;
  
  // 填充新積木
  const grid = document.getElementById('buildingGrid');
  const blockEls = grid.querySelectorAll('.block');
  
  if (blocks <= blockEls.length && blocks > 0) {
    const newBlock = blockEls[blocks - 1];
    const blockType = level.blockTypes[(blocks - 1) % level.blockTypes.length];
    newBlock.className = 'block filled ' + blockType;
  }
  
  const progress = (blocks / level.blocksNeeded) * 100;
  document.getElementById('progressFill').style.width = progress + '%';
  document.getElementById('progressText').textContent = 
    blocks >= level.blocksNeeded ? '🎉 建築完成！' : `還需要 ${level.blocksNeeded - blocks} 塊積木`;
}

// ===== 更新UI =====
function updateUI() {
  document.getElementById('blocksCount').textContent = gameState.blocks;
  document.getElementById('starsCount').textContent = gameState.stars;
  
  if (document.getElementById('blocksCount2')) {
    document.getElementById('blocksCount2').textContent = gameState.blocks;
    document.getElementById('starsCount2').textContent = gameState.stars;
  }
}

// ===== 語音播放 =====
function speak(text) {
  if ('speechSynthesis' in window) {
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'en-US';
    utterance.rate = 0.8;
    speechSynthesis.speak(utterance);
    
    const btn = document.getElementById('listenBtn');
    btn.classList.add('playing');
    utterance.onend = () => btn.classList.remove('playing');
  }
}

// ===== 成就提示 =====
function showAchievement(text) {
  const container = document.getElementById('achievements');
  const popup = document.createElement('div');
  popup.className = 'achievement-popup';
  popup.textContent = text;
  container.appendChild(popup);
  
  setTimeout(() => popup.remove(), 3000);
}

// ===== 頁面切換 =====
function showPage(page) {
  document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
  event.target.closest('.nav-btn').classList.add('active');
  
  document.getElementById('gameContainer').classList.remove('active');
  document.getElementById('levelSelect').classList.remove('active');
  document.getElementById('statsPage').classList.remove('active');
  document.getElementById('wordbook').classList.remove('active');
  
  switch(page) {
    case 'game':
      document.getElementById('gameContainer').classList.add('active');
      break;
    case 'levels':
      document.getElementById('levelSelect').classList.add('active');
      renderLevels();
      break;
    case 'wordbook':
      document.getElementById('wordbook').classList.add('active');
      renderWordbook();
      break;
    case 'stats':
      document.getElementById('statsPage').classList.add('active');
      renderStats();
      break;
  }
}

// ===== 渲染關卡選擇 =====
function renderLevels() {
  const grid = document.getElementById('levelGrid');
  grid.innerHTML = '';
  
  LEVELS.forEach((level, index) => {
    const card = document.createElement('div');
    card.className = 'level-card';
    
    const isUnlocked = index === 0 || gameState.levelProgress[LEVELS[index-1].id]?.completed;
    const isCompleted = gameState.levelProgress[level.id]?.completed;
    
    if (!isUnlocked) card.classList.add('locked');
    if (isCompleted) card.classList.add('completed');
    
    card.innerHTML = `
      <div class="level-num">${level.icon}</div>
      <div class="level-name">第${level.id}關：${level.name}</div>
      <div class="level-desc">${level.words.length}個單字 · ${level.blocksNeeded}塊積木</div>
    `;
    
    if (isUnlocked) {
      card.onclick = () => {
        showPage('game');
        document.querySelector('.nav-btn').classList.add('active');
        initLevel(level.id);
      };
    }
    
    grid.appendChild(card);
  });
}

// ===== 渲染單字本 =====
function renderWordbook() {
  const list = document.getElementById('wordList');
  list.innerHTML = '';
  
  if (gameState.learnedWords.length === 0) {
    list.innerHTML = '<div style="color:#fff;text-align:center;padding:50px">還沒有學習任何單字<br>開始遊戲吧！</div>';
    return;
  }
  
  // 找出所有學過的單字
  LEVELS.forEach(level => {
    level.words.forEach(word => {
      if (gameState.learnedWords.includes(word.en)) {
        const item = document.createElement('div');
        item.className = 'word-item';
        item.innerHTML = `
          <div class="word-en">${word.img} ${word.en}</div>
          <div class="word-zh">${word.zh}</div>
          <div class="word-sentence">${word.sentence}</div>
        `;
        item.onclick = () => speak(word.en);
        list.appendChild(item);
      }
    });
  });
}

// ===== 渲染統計 =====
function renderStats() {
  const minutes = Math.floor((Date.now() - gameState.todayStats.startTime) / 60000);
  
  document.getElementById('todayWords').textContent = gameState.todayStats.words;
  document.getElementById('todayCorrect').textContent = gameState.todayStats.correct;
  document.getElementById('todayBlocks').textContent = gameState.todayStats.blocks;
  document.getElementById('todayTime').textContent = minutes;
  
  document.getElementById('totalWords').textContent = gameState.learnedWords.length;
  document.getElementById('totalStars').textContent = gameState.stars;
  
  let completedBuildings = 0;
  Object.values(gameState.levelProgress).forEach(p => {
    if (p.completed) completedBuildings++;
  });
  document.getElementById('totalBuildings').textContent = completedBuildings;
  document.getElementById('totalDays').textContent = 1; // 簡化版
}

// ===== 初始化 =====
loadGame();
</script>
